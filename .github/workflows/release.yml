name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Prepare self-contained bindings directory
        run: |
          python3 -c "import shutil; from pathlib import Path; root = Path('bindings/python'); repo = Path('.'); src_copy = root / 'core_src'; src_copy.mkdir(exist_ok=True); [shutil.copytree(repo / d, src_copy / d, dirs_exist_ok=True) for d in ['src', 'include', 'cli', 'benchmarks', 'tests'] if (repo / d).exists()]; shutil.copy2(repo / 'CMakeLists.txt', src_copy / 'CMakeLists.txt')"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse bindings/python
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_BEFORE_BUILD: "pip install cmake ninja"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare self-contained bindings directory
        run: |
          python3 -c "import shutil; from pathlib import Path; root = Path('bindings/python'); repo = Path('.'); src_copy = root / 'core_src'; src_copy.mkdir(exist_ok=True); [shutil.copytree(repo / d, src_copy / d, dirs_exist_ok=True) for d in ['src', 'include', 'cli', 'benchmarks', 'tests'] if (repo / d).exists()]; shutil.copy2(repo / 'CMakeLists.txt', src_copy / 'CMakeLists.txt')"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist bindings/python

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: bindings/python/dist/*.tar.gz

  publish:
    name: Publish to PyPI & Create GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
