name: test

on:
  push:
    branches: [main]

jobs:
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure (sanitizers)
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build module
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DELIPS_BUILD_PYTHON=ON -DELIPS_BUILD_TESTS=OFF -DELIPS_BUILD_CLI=OFF
          cmake --build build --target elips_pymodule -j
      - name: Import + smoke test
        run: |
          PYTHONPATH=bindings/python python3 examples/python/01_getting_started.py
